name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: datalake
            uv_package: stocklake-datalake
          - service: market-live
            uv_package: stocklake-market-live
          - service: mcp-stocklake
            uv_package: stocklake-mcp-stocklake
          - service: api-gateway
            uv_package: ""
          - service: analytics
            uv_package: ""
          - service: screener
            uv_package: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run tests for service (if present)
        env:
          UV_PACKAGE: ${{ matrix.uv_package }}
        shell: bash
        run: |
          set -euo pipefail
          SERVICE_PATH="services/${{ matrix.service }}"
          if [ ! -d "${SERVICE_PATH}/tests" ]; then
            echo "No tests directory for ${SERVICE_PATH}; skipping."
            exit 0
          fi

          if ! find "${SERVICE_PATH}/tests" \( -name 'test_*.py' -o -name '*_test.py' \) -print -quit | grep -q .; then
            echo "No Python test files for ${SERVICE_PATH}; skipping."
            exit 0
          fi

          echo "Running tests for ${SERVICE_PATH}"
          if [ -n "${UV_PACKAGE}" ]; then
            uv sync --frozen --package "${UV_PACKAGE}"
            uv run --package "${UV_PACKAGE}" python -m pytest "${SERVICE_PATH}/tests" -q
          else
            python -m pip install --upgrade pip
            python -m pip install "${SERVICE_PATH}"
            pytest "${SERVICE_PATH}/tests" -q
          fi
